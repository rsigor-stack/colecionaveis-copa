<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Colecionáveis Copa</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 80px auto;
      padding: 0 20px;
    }
    h1 { text-align: center; }
    input {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #erro { color: red; margin-top: 10px; }
    #carregando { text-align: center; color: #666; }
  </style>
</head>
<body>

  <div id="carregando">Carregando...</div>

  <div id="formulario" style="display: none;">
    <h1>Álbum da Copa</h1>
    <input type="text" id="nome" placeholder="Seu nome">
    <input type="email" id="email" placeholder="Seu email">
    <button onclick="fazerLogin()">Entrar</button>
    <p id="erro"></p>
  </div>

  <script src="session.js"></script>
  <script src="api.js"></script>
  <script>
    // Ao carregar a página, verifica se já existe sessão
    window.onload = function() {
      const sessao = getSessao();
      if (sessao) {
        window.location.href = 'album.html';
      } else {
        document.getElementById('carregando').style.display = 'none';
        document.getElementById('formulario').style.display = 'block';
      }
    };

    async function fazerLogin() {
      const nome = document.getElementById('nome').value.trim();
      const email = document.getElementById('email').value.trim();
      const erroEl = document.getElementById('erro');

      if (!email) {
        erroEl.textContent = 'Digite seu email';
        return;
      }

      erroEl.textContent = '';

      const resultado = await api.login(email, nome);

      if (resultado.sucesso) {
        salvarSessao(resultado.usuario);
        window.location.href = 'album.html';
      } else {
        erroEl.textContent = resultado.erro || 'Erro ao entrar, tente novamente';
      }
    }
  </script>
</body>
</html>
