<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Álbum - Copa</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: #2563eb;
      font-weight: bold;
    }
    .progresso-container {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .barra-fundo {
      background: #e5e7eb;
      border-radius: 6px;
      height: 16px;
      overflow: hidden;
      margin-top: 8px;
    }
    .barra-preenchida {
      background: #22c55e;
      height: 100%;
      transition: width 0.3s;
    }
    #btnPacote {
      display: block;
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    #btnPacote:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .grade {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
    }
    .figurinha {
      background: white;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      border: 2px solid transparent;
    }
    .figurinha img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 4px;
    }
    .figurinha.falta {
      opacity: 0.35;
      filter: grayscale(1);
    }
    .figurinha.especial {
      border-color: gold;
    }
    .qtd-repetida {
      color: #22c55e;
      font-weight: bold;
    }
    #resultadoPacote {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Meu Álbum</h1>
    <nav>
      <a href="mural.html">Mural</a>
      <a href="propostas.html">Propostas</a>
      <a href="#" onclick="sair()">Sair</a>
    </nav>
  </header>

  <div class="progresso-container">
    <div id="nomeUsuario"></div>
    <div id="progressoTexto"></div>
    <div class="barra-fundo">
      <div class="barra-preenchida" id="barraProgresso" style="width: 0%"></div>
    </div>
  </div>

  <button id="btnPacote" onclick="resgatarPacote()">Resgatar pacote de hoje</button>

  <div id="resultadoPacote"></div>

  <div class="grade" id="grade">Carregando álbum...</div>

  <script src="session.js"></script>
  <script src="api.js"></script>
  <script>
    let usuario = null;

    window.onload = async function() {
      usuario = getSessao();
      if (!usuario) {
        window.location.href = 'index.html';
        return;
      }
      await carregarAlbum();
    };

    async function carregarAlbum() {
      const resultado = await api.getAlbum(usuario.id);

      if (!resultado.sucesso) {
        document.getElementById('grade').textContent = 'Erro ao carregar álbum: ' + resultado.erro;
        return;
      }

      document.getElementById('nomeUsuario').textContent =
        `${resultado.usuario.nome} — sequência de ${resultado.usuario.streak_atual} dia(s)`;

      document.getElementById('progressoTexto').textContent =
        `${resultado.progresso.possuidas} de ${resultado.progresso.total} figurinhas (${resultado.progresso.percentual}%)`;

      document.getElementById('barraProgresso').style.width = resultado.progresso.percentual + '%';

      const grade = document.getElementById('grade');
      grade.innerHTML = '';

      resultado.album.forEach(fig => {
        const div = document.createElement('div');
        div.className = 'figurinha' + (fig.possui ? '' : ' falta') + (fig.raridade === 'especial' ? ' especial' : '');

        div.innerHTML = `
          <img src="${fig.imagem_url}" alt="${fig.nome}">
          <div>${fig.numero_album}. ${fig.nome}</div>
          ${fig.repetidas > 0 ? `<div class="qtd-repetida">+${fig.repetidas} repetida(s)</div>` : ''}
        `;

        grade.appendChild(div);
      });
    }

    async function resgatarPacote() {
      const btn = document.getElementById('btnPacote');
      btn.disabled = true;
      btn.textContent = 'Abrindo pacote...';

      const resultado = await api.gerarPacoteDiario(usuario.id);

      const resultadoDiv = document.getElementById('resultadoPacote');

      if (resultado.erro) {
        resultadoDiv.style.display = 'block';
        resultadoDiv.textContent = resultado.jaResgatado
          ? 'Você já resgatou o pacote de hoje. Volte amanhã!'
          : 'Erro: ' + resultado.erro;
        btn.textContent = 'Resgatar pacote de hoje';
        btn.disabled = resultado.jaResgatado ? true : false;
        return;
      }

      resultadoDiv.style.display = 'block';
      resultadoDiv.innerHTML = `
        <strong>Você recebeu:</strong><br>
        ${resultado.figurinhas.map(f => 
          `${f.nome} (${f.raridade})${f.novaNoAlbum ? ' — NOVA!' : ' — repetida'}`
        ).join('<br>')}
      `;

      btn.textContent = 'Pacote de hoje já resgatado';
      btn.disabled = true;

      await carregarAlbum(); // atualiza o álbum na tela com o que acabou de ganhar
    }

    function sair() {
      limparSessao();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
